name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-mod:
    name: Build ReiParticleSkill
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Build and test mod
        working-directory: forge-port
        run: ./gradlew build
      - name: Upload mod jar
        uses: actions/upload-artifact@v4
        with:
          name: reiparticleskill-jar
          path: forge-port/build/libs/*.jar
